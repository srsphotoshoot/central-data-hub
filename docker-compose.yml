version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: cdh_database
      POSTGRES_USER: cdh_user
      POSTGRES_PASSWORD: cdh_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cdh-hub:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cdh_user:cdh_password@db:5432/cdh_database
      - DECENT_ERP_API_URL=${DECENT_ERP_API_URL}
      - DECENT_ERP_API_KEY=${DECENT_ERP_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data:
